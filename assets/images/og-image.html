<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kōhī House — OG Image (1200×630)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .note {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
      text-align: center;
      max-width: 90%;
      z-index: 10;
    }
    .og-canvas {
      width: 1200px;
      height: 630px;
      background: #0D0906;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .og-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,137,74,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 100% 100% at 50% 100%, rgba(42,21,8,0.9) 0%, transparent 55%);
      pointer-events: none;
    }
    .og-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem 4.5rem;
      text-align: center;
    }
    .og-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 96px;
      font-weight: 700;
      color: #F5E6C8;
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .og-title em {
      font-style: italic;
      color: #C8894A;
    }
    .og-subtitle {
      margin-top: 1.25rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      font-style: italic;
      color: rgba(245,230,200,0.72);
      letter-spacing: 0.04em;
    }
    .og-address {
      position: absolute;
      left: 3rem;
      bottom: 2.75rem;
      font-size: 15px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245,230,200,0.45);
      line-height: 1.6;
      text-align: left;
    }
    .og-accent {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 6px;
      background: linear-gradient(90deg, transparent 0%, #C8894A 20%, #C8894A 80%, transparent 100%);
    }
  </style>
</head>
<body>
  <p class="note">Screenshot this card at exactly 1200×630 and save as <strong>og-image.jpg</strong> in this folder.</p>
  <div class="og-canvas" id="og-canvas">
    <div class="og-inner">
      <h1 class="og-title">Kō<span style="color:#C8894A">hī</span> House</h1>
      <p class="og-subtitle">Where time slows down</p>
    </div>
    <p class="og-address">12 Third Cross Street · Versova<br>Andheri West, Mumbai 400061</p>
    <div class="og-accent" aria-hidden="true"></div>
  </div>
</body>
</html>
